# `sheldon` configuration file
# ----------------------------
#
# You can modify this file directly or you can use one of the following
# `sheldon` commands which are provided to assist in editing the config file:
#
# - `sheldon add` to add a new plugin to the config file
# - `sheldon edit` to open up the config file in the default editor
# - `sheldon remove` to remove a plugin from the config file
#
# See the documentation for more https://github.com/rossmacarthur/sheldon#readme

shell = "zsh"

apply = ["defer"]

[templates]
defer = "{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}"

[plugins]

############################
### Eager Loading
############################
[plugins.zsh-defer]
github = "romkatv/zsh-defer"
apply = ["source"]

[plugins.eager]
local = "~/.config/zsh"
use = ["eager/*.zsh"]
apply = ["source"]

# workspace CLI を PATH へ即時反映するため eager（defer だと pane 起動直後に使えない）
[plugins.workspace]
local = "~/.config/zsh/plugins/workspace"
use = ["plugin.zsh"]
apply = ["source"]

[plugins.starship]
inline = """
eval "$(starship init zsh)"
"""

############################
### Lazy Loading
############################
[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
dir = "src"
apply = ["fpath"]

# zsh-defer の FIFO 順で compinit（lazy/completion.zsh）より前に source される。
# fzf-tab 側の pre-compinit フォールバック（builtin widget の先回り複製）で動作している
[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"

[plugins.zsh-syntax-highlighting]
github = "zsh-users/zsh-syntax-highlighting"

[plugins.zsh-autopair]
github = "hlissner/zsh-autopair"

[plugins.zsh-replace-multiple-dots]
github = "momo-lab/zsh-replace-multiple-dots"

[plugins.zoxide]
inline = """
export _ZO_DATA_DIR="$XDG_DATA_HOME/zoxide"
zsh-defer -a -t0.01 eval "$(zoxide init zsh)"
"""

[plugins.zabrze]
inline = """
zsh-defer -a -t0.01 eval "$(zabrze init --bind-keys)"
"""

[plugins.lazy]
local = "~/.config/zsh"
use = ["lazy/*.zsh"]
