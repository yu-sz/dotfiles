format = "[░▒▓](#a3aed2)[  ](bg:#a3aed2 fg:#090c0c)[](bg:#3B6ADB fg:#a3aed2)$directory[](fg:#3B6ADB bg:#394260)$git_branch$git_status$git_state[](fg:#394260 bg:#212736)$nodejs$bun$lua[](fg:#212736 bg:#1d2230)$time[ ](fg:#1d2230)\n$character\n"

[bun]
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"
style = "bg:#212736"
symbol = "🥟 "

[directory]
format = "[ $path ]($style)"
style = "fg:#e3e5e5 bg:#3B6ADB"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
Documents = "󰈙 "
Downloads = " "
Music = " "
Pictures = " "

[git_branch]
format = "[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)"
style = "bg:#394260"
symbol = ""

[git_state]
am = ""
am_or_rebase = ""
bisect = ""
cherry_pick = "🍒"
disabled = false
format = "[[($state )](fg:#769ff0 bg:#394260)]($style)"
merge = " "
rebase = "󰡒 "
revert = " "
style = "bg:#394260"

[git_status]
ahead = ""
behind = ""
conflicted = "⚡️"
deleted = ""
diverged = ""
format = "[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)"
modified = "🔥"
renamed = ""
staged = ""
stashed = ""
style = "bg:#394260"
untracked = ""
up_to_date = "✓"

[lua]
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"
style = "bg:#212736"
symbol = "󰢱 "

[nodejs]
format = "[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)"
style = "bg:#212736"
symbol = " "

[time]
disabled = true
format = "[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)"
style = "bg:#1d2230"
time_format = "%R"
