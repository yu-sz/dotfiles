onboarding = false

[theme]
name = "tokyo-night"

[keys]
prefix = "ctrl+g"
new_tab = "prefix+c"
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
split_vertical = "prefix+v"
split_horizontal = "prefix+minus"

# navigate モード（prefix+w）: j/k でスペース選択。workspace_* が pane_* より
navigate_workspace_up = "k"
navigate_workspace_down = "j"
navigate_pane_up = "ctrl+k"
navigate_pane_down = "ctrl+j"

# lazygit=prefix+shift+l / btop=prefix+shift+b / hunk=prefix+shift+h。
# alt+* は AeroSpace（tiling WM）が OS レベルで全部奪うため使用不可。
# 平打ち g=goto / b=toggle_sidebar / shift+g=new_worktree も使用中のため shift 系を採用。
# lazygit / btop / hunk は popup（v0.7.4+）。旧バイナリの常駐 server は unknown variant 警告を出し
# キー設定全体が不適用になるため、herdr 更新後は server 再起動が必要。
[[keys.command]]
key = "prefix+shift+l"
type = "popup"
command = "lazygit"
description = "run lazygit"
width = "90%"
height = "90%"

[[keys.command]]
key = "prefix+shift+b"
type = "popup"
command = "btop"
description = "run btop"
width = "90%"
height = "90%"

[[keys.command]]
key = "prefix+shift+h"
type = "popup"
command = "hunk diff"
description = "review diff with hunk"
width = "90%"
height = "90%"

# ghq repo を fzf で選び workspace を起動/フォーカスする。
# command は /bin/sh -lc 実行のため、sheldon が interactive shell で足す PATH に依存しない $HOME 絶対パスで書く。
[[keys.command]]
key = "prefix+shift+t"
type = "pane"
command = "$HOME/.config/zsh/plugins/workspace/bin/workspace new"
description = "open repo picker"

[ui.toast]
delivery = "herdr"

[ui]
mouse_capture = true

# 日本語 IME 対策（実測: config スキーマに存在、macOS 向け）。
# Claude Code / codex の TUI で IME 候補ウィンドウ追従と prefix 入力の取りこぼしを緩和する。
[experimental]
reveal_hidden_cursor_for_cjk_ime = true
cjk_ime_agents = ["claude", "codex"]
switch_ascii_input_source_in_prefix = true
