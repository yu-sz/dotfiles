# ── AI ──

[[snippets]]
name = "claude"
trigger = "cl"
snippet = "claude --mcp-config=$HOME/.claude/mcp/.mcp.json"

[[snippets]]
name = "claude yolo mode (skip command permission)"
trigger = "cly"
snippet = "claude --mcp-config=$HOME/.claude/mcp/.mcp.json --dangerously-skip-permissions"

[[snippets]]
name = "(claude) --dangerously-skip-permissions"
trigger = "y"
snippet = "--dangerously-skip-permissions"
global = true
context = '^claude\s'

[[snippets]]
name = "ccusage"
trigger = "cc"
snippet = "npx ccusage"

[[snippets]]
name = "ccusage live monitor"
trigger = "ccm"
snippet = "npx ccusage blocks --live"

[[snippets]]
name = "ccusage live monitor (option only)"
trigger = "m"
snippet = "blocks --live"
global = true
context = '^npx ccusage\s'

# ── Nix ──

[[snippets]]
name = "nix rebuild switch (darwin)"
trigger = "nrs"
snippet = "nh darwin switch $DOTFILES_DIR"
if = '[[ "$OSTYPE" =~ darwin ]]'

[[snippets]]
name = "nix rebuild switch (linux)"
trigger = "nrs"
snippet = "nh home switch $DOTFILES_DIR"
if = '[[ "$OSTYPE" =~ linux ]]'
