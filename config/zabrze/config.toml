# ── General ──

[[snippets]]
name = "nvim"
trigger = "v"
snippet = "nvim"

[[snippets]]
name = "clear"
trigger = "c"
snippet = "clear"

[[snippets]]
name = "search process without grep"
trigger = "pss"
snippet = 'ps aux | grep -E "PID|{}" | grep -v grep'

[[snippets]]
name = "zsh startup time"
trigger = "zsht"
snippet = "time zsh -i -c exit"

# ── Git ──

[[snippets]]
name = "git log"
trigger = "gl"
snippet = 'git log --pretty=format:"%C(auto)%h (%C(blue)%cd%C(auto))%d %s %Cblue" --date=format:"%Y/%m/%d %H:%M:%S" -n 10'

[[snippets]]
name = "git log --graph"
trigger = "ggr"
snippet = "git log --graph --date=short --decorate=short --pretty=format:'%Cgreen%h %Creset%cd %Cblue%cn %Cred%d %Creset%s'"

[[snippets]]
name = "git status"
trigger = "gs"
snippet = "git status"

[[snippets]]
name = "git diff"
trigger = "gd"
snippet = "git diff"

[[snippets]]
name = "git add"
trigger = "ga"
snippet = "git add"

[[snippets]]
name = "git add ."
trigger = "gaa"
snippet = "git add ."

[[snippets]]
name = "git commit"
trigger = "gc"
snippet = "git commit"

[[snippets]]
name = "git commit -m"
trigger = "gcm"
snippet = 'git commit -m "{}"'

[[snippets]]
name = "git checkout -b"
trigger = "gcob"
snippet = 'git checkout -b "{}" && git commit --allow-empty -m "start working on $(git rev-parse --abbrev-ref HEAD)"'

[[snippets]]
name = "branch name"
trigger = "B"
snippet = "$(git symbolic-ref --short HEAD)"
evaluate = true
global = true
context = '^git\s'

