# Docker Desktop operations
[[snippets]]
name = "start Docker Desktop in background"
trigger = "dds"
snippet = "open --background -a Docker"

[[snippets]]
name = "stop Docker Desktop"
trigger = "ddk"
snippet = "pkill -f Docker"

[[snippets]]
name = "restart Docker Desktop"
trigger = "ddr"
snippet = "pkill -f Docker && open -a Docker"

