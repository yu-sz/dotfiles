name: Nix Build (darwin)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "flake.lock"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ github.token }}

      - name: Build darwin configuration
        run: nix build .#darwinConfigurations.yu-sz.system --print-build-logs
