name: Bump herdr

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 6"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6

      # releases/latest は draft / pre-release を含まないため stable のみ拾う
      - name: Check latest stable release
        id: latest
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          latest=$(gh api repos/ogulcancelik/herdr/releases/latest --jq .tag_name)
          current=$(grep -oE 'github:ogulcancelik/herdr/v[0-9]+\.[0-9]+\.[0-9]+' flake.nix | cut -d/ -f3)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "current=$current latest=$latest"

      # 外部リポジトリ由来のタグ名は ${{ }} で run: に直接展開せず env 経由で渡す
      - name: Bump herdr tag in flake.nix
        if: steps.latest.outputs.latest != steps.latest.outputs.current
        env:
          LATEST: ${{ steps.latest.outputs.latest }}
          CURRENT: ${{ steps.latest.outputs.current }}
        run: |
          if [ -z "$LATEST" ] || [ -z "$CURRENT" ]; then
            echo "tag detection failed (latest='$LATEST' current='$CURRENT')" >&2
            exit 1
          fi
          sed -i "s|github:ogulcancelik/herdr/$CURRENT|github:ogulcancelik/herdr/$LATEST|" flake.nix

      - uses: cachix/install-nix-action@v31
        if: steps.latest.outputs.latest != steps.latest.outputs.current
        with:
          github_access_token: ${{ steps.app-token.outputs.token }}

      - name: Update flake.lock for herdr
        if: steps.latest.outputs.latest != steps.latest.outputs.current
        run: nix flake update herdr

      - uses: peter-evans/create-pull-request@v7
        if: steps.latest.outputs.latest != steps.latest.outputs.current
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: bump-herdr
          commit-message: "chore(nix): bump herdr to ${{ steps.latest.outputs.latest }}"
          title: "chore(nix): bump herdr to ${{ steps.latest.outputs.latest }}"
          labels: dependencies
          body: |
            Automated bump of the herdr flake input to the latest stable release.

            ${{ steps.latest.outputs.current }} -> ${{ steps.latest.outputs.latest }}

            Release notes: https://github.com/ogulcancelik/herdr/releases/tag/${{ steps.latest.outputs.latest }}
