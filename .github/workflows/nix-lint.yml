name: Nix Lint

on:
  push:
    paths:
      - "**/*.nix"
      - "flake.lock"
      - "Justfile"
      - "scripts/**"
      - ".github/workflows/nix-lint.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # gitleaks の全履歴スキャンのため fetch-depth: 0
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ github.token }}

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-lint-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-lint-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-lint-${{ runner.os }}-
          purge-last-accessed: P7D
          purge-primary-key: never

      - uses: DeterminateSystems/flake-checker-action@v9

      - name: CI check
        run: nix develop --command just ci

      - name: Secret scan (full history)
        run: nix develop --command gitleaks git --no-banner
